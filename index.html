<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O que devo fazer hoje?</title>
  <!-- manifest PWA -->
  <link rel="manifest" href="manifest.json">
  <style>
    /* === style.css (incorporado para single-file, mas separado virtualmente) === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #faf8f5;
      color: #2e3b3b;
      padding: 1.5rem 1rem 3rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      max-width: 1000px;
      width: 100%;
    }

    /* cabeçalho */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: #3a5e5e;
      line-height: 1.2;
    }

    .header .sub {
      font-size: 1rem;
      color: #7f9a9a;
      margin-top: 0.3rem;
      font-weight: 300;
    }

    /* seção dias da semana em cartões/abas (usaremos cartões tipo tab expansivos) */
    .dias-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .dia-card {
      flex: 1 1 160px;
      min-width: 140px;
      background: white;
      border-radius: 28px;
      padding: 1.2rem 1rem 1rem;
      box-shadow: 0 10px 20px -8px rgba(0, 20, 20, 0.1);
      transition: all 0.2s ease;
      border: 1px solid #f0eae4;
      cursor: pointer;
    }

    .dia-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 24px -10px rgba(50, 80, 80, 0.15);
    }

    .dia-card.ativo {
      background: #ffffff;
      border: 2px solid #b5cfcf;
      box-shadow: 0 8px 18px -6px #8bb3b3;
    }

    .dia-nome {
      font-weight: 600;
      font-size: 1.3rem;
      color: #2c4e4e;
      margin-bottom: 0.4rem;
    }

    .tarefa-resumo {
      font-size: 0.85rem;
      color: #6d8a8a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* painel ativo do dia */
    .painel-dia {
      background: white;
      border-radius: 40px;
      padding: 1.8rem 1.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 15px 30px -12px rgba(50, 60, 60, 0.15);
      border: 1px solid #e3dbd1;
    }

    .painel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .painel-titulo {
      font-size: 2rem;
      font-weight: 400;
      color: #315e5e;
    }

    .btn-add {
      background: none;
      border: 1.5px dashed #9fc7c7;
      color: #2c6b6b;
      padding: 0.6rem 1.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-add:hover {
      background: #ecf7f7;
      border-color: #5e9e9e;
    }

    /* form adicionar tarefa (inicialmente oculto) */
    .add-tarefa-form {
      background: #f6f9f9;
      border-radius: 32px;
      padding: 1.2rem;
      margin-bottom: 2rem;
      display: none;
      border: 1px solid #dae8e8;
    }

    .add-tarefa-form.mostrar {
      display: block;
    }

    .add-tarefa-form input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid #cbdcdc;
      border-radius: 40px;
      font-size: 1rem;
      background: white;
      margin-bottom: 1rem;
    }

    .form-botoes {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
    }

    .btn-salvar, .btn-cancelar {
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn-salvar {
      background: #699e9e;
      color: white;
    }

    .btn-salvar:hover {
      background: #4f8383;
    }

    .btn-cancelar {
      background: #e7e2db;
      color: #3c4f4f;
    }

    /* lista de tarefas */
    .lista-tarefas {
      list-style: none;
      margin-top: 1rem;
    }

    .tarefa-item {
      background: #fefefe;
      border-radius: 60px;
      padding: 0.7rem 1rem 0.7rem 1.5rem;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #efebe6;
      box-shadow: 0 2px 6px #f0f0f0;
    }

    .tarefa-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      flex: 1;
    }

    .tarefa-nome {
      font-size: 1.1rem;
      color: #1f3b3b;
    }

    .tarefa-concluida .tarefa-nome {
      text-decoration: line-through;
      color: #99b0b0;
    }

    .tarefa-acoes {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .btn-check, .btn-delete {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
    }

    .btn-check:hover {
      background: #dff0f0;
    }
    .btn-delete:hover {
      background: #ffe1de;
    }

    .sentimento-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      background: #f1f6f6;
      padding: 0.3rem 1rem 0.3rem 0.8rem;
      border-radius: 40px;
    }
    .sentimento-info img.sentimento-foto {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* popup sentimentos (overlay simples) */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .popup-card {
      background: white;
      max-width: 400px;
      width: 90%;
      border-radius: 48px;
      padding: 2rem 1.5rem;
      box-shadow: 0 30px 40px rgba(0,20,20,0.3);
      text-align: center;
    }
    .popup-card h3 {
      color: #285e5e;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }
    .emojis-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin-bottom: 1.8rem;
    }
    .emoji-opcao {
      font-size: 2.2rem;
      background: #f0f7f7;
      border-radius: 60px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.1s;
    }
    .emoji-opcao.selecionado {
      border-color: #3f9e9e;
      background: #e1f3f3;
    }
    .foto-upload {
      margin: 1.2rem 0;
    }
    .foto-upload label {
      background: #dfecec;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      display: inline-block;
      cursor: pointer;
    }
    #popup-foto {
      display: none;
    }
    .preview-foto {
      max-width: 100%;
      max-height: 150px;
      border-radius: 30px;
      margin-top: 0.8rem;
    }
    .popup-botoes {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
    }

    /* cantinho de gratidão */
    .gratidao-section {
      margin-top: 2.5rem;
    }
    .gratidao-titulo {
      font-size: 1.8rem;
      font-weight: 350;
      color: #386b6b;
      margin-bottom: 0.25rem;
    }
    .gratidao-sub {
      color: #88a2a2;
      margin-bottom: 1.5rem;
    }
    .btn-add-memoria {
      background: #ffffffd0;
      border: 1px solid #b3cfcf;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      font-size: 1rem;
      margin-bottom: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 10px #f0eae4;
    }
    .memorias-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.2rem;
    }
    .memoria-card {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 8px 18px -8px #d0cdc7;
      border: 1px solid #eee5dc;
      position: relative;
    }
    .memoria-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #cbcbcb;
    }
    .legenda {
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      color: #2b4949;
    }
    .delete-memoria {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(255,255,255,0.9);
      border: none;
      font-size: 1.3rem;
      border-radius: 50%;
      width: 38px; height: 38px;
      cursor: pointer;
    }

    /* responsividade */
    @media (max-width: 600px) {
      body { padding: 1rem 0.8rem; }
      .painel-dia { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
<div class="app-container">

  <header class="header">
    <h1>O que devo fazer hoje?</h1>
    <div class="sub">Organize seus dias com leveza.</div>
  </header>

  <!-- Seção 1: Dias da semana em cartões -->
  <div class="dias-grid" id="diasGrid"></div>

  <!-- Painel ativo do dia com tarefas -->
  <div class="painel-dia" id="painelDia">
    <div class="painel-header">
      <span class="painel-titulo" id="painelTituloDia">Segunda</span>
      <button class="btn-add" id="btnMostrarForm">+ Adicionar tarefa</button>
    </div>

    <!-- formulário adicionar tarefa -->
    <div class="add-tarefa-form" id="addTarefaForm">
      <input type="text" id="novaTarefaInput" placeholder="Digite a tarefa...">
      <div class="form-botoes">
        <button class="btn-cancelar" id="cancelarAdd">Cancelar</button>
        <button class="btn-salvar" id="salvarTarefa">Salvar</button>
      </div>
    </div>

    <!-- lista de tarefas do dia atual -->
    <ul class="lista-tarefas" id="listaTarefas"></ul>
  </div>

  <!-- Cantinho de gratidão -->
  <div class="gratidao-section">
    <div class="gratidao-titulo">Cantinho de gratidão</div>
    <div class="gratidao-sub">pequenos momentos da vida</div>
    <button class="btn-add-memoria" id="btnAddMemoria">📸 Adicionar memória</button>

    <div class="memorias-grid" id="memoriasGrid"></div>
  </div>
</div>

<!-- Popup de sentimento -->
<div class="popup-overlay" id="popupSentimento">
  <div class="popup-card">
    <h3>Como você se sentiu após terminar essa tarefa?</h3>
    <div class="emojis-grid" id="emojisContainer">
      <!-- emojis serão inseridos via js -->
    </div>
    <div class="foto-upload">
      <label for="popup-foto">📷 Adicionar foto</label>
      <input type="file" id="popup-foto" accept="image/*">
      <img id="fotoPreview" class="preview-foto" style="display:none;">
    </div>
    <div class="popup-botoes">
      <button class="btn-cancelar" id="cancelarSentimento">Cancelar</button>
      <button class="btn-salvar" id="salvarSentimento">Salvar sentimento</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- DADOS ----------
    const DIAS = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
    // Estrutura: tarefasPorDia[dia] = array de { id, nome, concluida, sentimento?, foto? }
    let tarefasPorDia = {};
    // memórias: array de { id, fotoDataURL, legenda }
    let memorias = [];

    // Inicializar dados padrão
    DIAS.forEach(d => { if (!tarefasPorDia[d]) tarefasPorDia[d] = []; });

    // Carregar do localStorage
    function carregarDados() {
      try {
        const saved = localStorage.getItem('app_tarefas_sentimentos');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.tarefas) tarefasPorDia = parsed.tarefas;
          if (parsed.memorias) memorias = parsed.memorias;
        }
        // garantir todos os dias
        DIAS.forEach(d => { if (!tarefasPorDia[d]) tarefasPorDia[d] = []; });
      } catch (e) { console.warn('Erro ao carregar', e); }
    }
    function salvarDados() {
      localStorage.setItem('app_tarefas_sentimentos', JSON.stringify({
        tarefas: tarefasPorDia,
        memorias: memorias
      }));
    }

    // Estado UI
    let diaAtual = 'Segunda';
    let tarefaEmFocoId = null; // para associar sentimento

    // Elementos
    const diasGrid = document.getElementById('diasGrid');
    const painelTitulo = document.getElementById('painelTituloDia');
    const listaTarefasEl = document.getElementById('listaTarefas');
    const btnMostrarForm = document.getElementById('btnMostrarForm');
    const addForm = document.getElementById('addTarefaForm');
    const novaTarefaInput = document.getElementById('novaTarefaInput');
    const cancelarAdd = document.getElementById('cancelarAdd');
    const salvarTarefaBtn = document.getElementById('salvarTarefa');
    const popup = document.getElementById('popupSentimento');
    const emojisContainer = document.getElementById('emojisContainer');
    const fotoInput = document.getElementById('popup-foto');
    const fotoPreview = document.getElementById('fotoPreview');
    const cancelarSentimento = document.getElementById('cancelarSentimento');
    const salvarSentimentoBtn = document.getElementById('salvarSentimento');
    const btnAddMemoria = document.getElementById('btnAddMemoria');
    const memoriasGrid = document.getElementById('memoriasGrid');

    // Emojis predefinidos
    const EMOJIS = [
      '😀 Feliz', '😌 Aliviado', '🙏 Grato', '💪 Orgulhoso', '😊 Bem', '😴 Cansado'
    ];

    let emojiSelecionado = '😀 Feliz';

    // Renderizar dias (cartões)
    function renderDias() {
      diasGrid.innerHTML = '';
      DIAS.forEach(dia => {
        const card = document.createElement('div');
        card.className = `dia-card ${dia === diaAtual ? 'ativo' : ''}`;
        card.dataset.dia = dia;
        const tarefasHoje = tarefasPorDia[dia] || [];
        const pendentes = tarefasHoje.filter(t => !t.concluida).length;
        card.innerHTML = `
          <div class="dia-nome">${dia}</div>
          <div class="tarefa-resumo">${pendentes} pendente(s)</div>
        `;
        card.addEventListener('click', () => {
          diaAtual = dia;
          renderDias();
          renderPainelDia();
        });
        diasGrid.appendChild(card);
      });
    }

    // Renderizar tarefas do dia atual
    function renderPainelDia() {
      painelTitulo.textContent = diaAtual;
      const tarefas = tarefasPorDia[diaAtual] || [];
      listaTarefasEl.innerHTML = '';
      tarefas.forEach(t => {
        const li = document.createElement('li');
        li.className = `tarefa-item ${t.concluida ? 'tarefa-concluida' : ''}`;
        li.dataset.id = t.id;

        const infoDiv = document.createElement('div');
        infoDiv.className = 'tarefa-info';

        const nomeSpan = document.createElement('span');
        nomeSpan.className = 'tarefa-nome';
        nomeSpan.textContent = t.nome;

        infoDiv.appendChild(nomeSpan);

        // mostrar sentimento se existir
        if (t.sentimento || t.foto) {
          const sentDiv = document.createElement('div');
          sentDiv.className = 'sentimento-info';
          sentDiv.innerHTML = t.sentimento ? t.sentimento.split(' ')[0] : '';
          if (t.foto) {
            const img = document.createElement('img');
            img.src = t.foto;
            img.className = 'sentimento-foto';
            sentDiv.appendChild(img);
          }
          infoDiv.appendChild(sentDiv);
        }

        const acoesDiv = document.createElement('div');
        acoesDiv.className = 'tarefa-acoes';

        const checkBtn = document.createElement('button');
        checkBtn.className = 'btn-check';
        checkBtn.innerHTML = t.concluida ? '↩️' : '✔️';
        checkBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!t.concluida) {
            // marcar concluida e abrir popup de sentimento
            tarefaEmFocoId = t.id;
            abrirPopupSentimento();
          } else {
            // desmarcar concluida
            t.concluida = false;
            // opcional: remover sentimento? não foi pedido, manteremos.
            salvarDados();
            renderPainelDia();
          }
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn-delete';
        deleteBtn.innerHTML = '🗑️';
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Apagar esta tarefa?')) {
            tarefasPorDia[diaAtual] = tarefasPorDia[diaAtual].filter(ta => ta.id !== t.id);
            salvarDados();
            renderPainelDia();
            renderDias();
          }
        });

        acoesDiv.appendChild(checkBtn);
        acoesDiv.appendChild(deleteBtn);
        li.appendChild(infoDiv);
        li.appendChild(acoesDiv);
        listaTarefasEl.appendChild(li);
      });
    }

    // Popup sentimento
    function abrirPopupSentimento() {
      emojisContainer.innerHTML = '';
      EMOJIS.forEach(e => {
        const span = document.createElement('span');
        span.className = `emoji-opcao ${e === emojiSelecionado ? 'selecionado' : ''}`;
        span.textContent = e;
        span.addEventListener('click', () => {
          document.querySelectorAll('.emoji-opcao').forEach(el => el.classList.remove('selecionado'));
          span.classList.add('selecionado');
          emojiSelecionado = e;
        });
        emojisContainer.appendChild(span);
      });
      // reset foto preview
      fotoPreview.style.display = 'none';
      fotoPreview.src = '';
      fotoInput.value = '';
      popup.style.display = 'flex';
    }

    cancelarSentimento.addEventListener('click', () => {
      popup.style.display = 'none';
      tarefaEmFocoId = null;
    });

    fotoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          fotoPreview.src = ev.target.result;
          fotoPreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    salvarSentimentoBtn.addEventListener('click', () => {
      if (!tarefaEmFocoId) return;
      const tarefa = tarefasPorDia[diaAtual].find(t => t.id === tarefaEmFocoId);
      if (tarefa) {
        tarefa.concluida = true;
        tarefa.sentimento = emojiSelecionado;
        if (fotoPreview.src && fotoPreview.src.startsWith('data:image')) {
          tarefa.foto = fotoPreview.src;
        } else {
          tarefa.foto = null;
        }
        salvarDados();
      }
      popup.style.display = 'none';
      tarefaEmFocoId = null;
      renderPainelDia();
      renderDias();
    });

    // Adicionar tarefa
    btnMostrarForm.addEventListener('click', () => {
      addForm.classList.add('mostrar');
      novaTarefaInput.focus();
    });
    cancelarAdd.addEventListener('click', () => {
      addForm.classList.remove('mostrar');
      novaTarefaInput.value = '';
    });
    salvarTarefaBtn.addEventListener('click', () => {
      const nome = novaTarefaInput.value.trim();
      if (!nome) return;
      const nova = {
        id: Date.now() + Math.random().toString(36),
        nome: nome,
        concluida: false
      };
      tarefasPorDia[diaAtual].push(nova);
      salvarDados();
      novaTarefaInput.value = '';
      addForm.classList.remove('mostrar');
      renderPainelDia();
      renderDias();
    });

    // Cantinho de gratidão
    function renderMemorias() {
      memoriasGrid.innerHTML = '';
      memorias.forEach(m => {
        const card = document.createElement('div');
        card.className = 'memoria-card';
        card.innerHTML = `
          <img src="${m.fotoDataURL || 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23eee%22%2F%3E%3Ctext%20x%3D%2210%22%20y%3D%2255%22%20font-family%3D%22sans-serif%22%20font-size%3D%2214%22%20fill%3D%22%23999%22%3Esem foto%3C%2Ftext%3E%3C%2Fsvg%3E'}" alt="memoria">
          <div class="legenda">${m.legenda || ' '}</div>
          <button class="delete-memoria" data-id="${m.id}">🗑️</button>
        `;
        card.querySelector('.delete-memoria').addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Apagar esta memória?')) {
            memorias = memorias.filter(mem => mem.id !== m.id);
            salvarDados();
            renderMemorias();
          }
        });
        memoriasGrid.appendChild(card);
      });
    }

    btnAddMemoria.addEventListener('click', () => {
      const legenda = prompt('Legenda para essa memória:');
      if (legenda === null) return;
      // simular escolha de foto (input)
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            memorias.push({
              id: Date.now() + '-' + Math.random(),
              fotoDataURL: ev.target.result,
              legenda: legenda.trim() || 'minha memória'
            });
            salvarDados();
            renderMemorias();
          };
          reader.readAsDataURL(file);
        } else {
          // sem foto, usar placeholder
          memorias.push({
            id: Date.now() + '-' + Math.random(),
            fotoDataURL: null,
            legenda: legenda.trim() || 'memória'
          });
          salvarDados();
          renderMemorias();
        }
      };
      input.click();
    });

    // Inicialização
    carregarDados();
    renderDias();
    renderPainelDia();
    renderMemorias();

    // service worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('SW não registrado', e));
    }
  })();
</script>
