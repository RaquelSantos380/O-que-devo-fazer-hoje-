<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>minhas tarefas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <div class="header">
            <h1 class="titulo">minhas tarefas</h1>
            <button class="btn-editar" id="btnEditar">✎</button>
        </div>

        <!-- Tela Principal (tarefas de hoje) -->
        <div id="telaPrincipal" class="tela ativa">
            <div class="data-container">
                <h2 id="dataAtual" class="data"></h2>
                <p class="subtitulo">suas tarefas de hoje</p>
            </div>

            <div class="tarefas-lista" id="tarefasHoje">
                <!-- As tarefas serão inseridas aqui pelo JavaScript -->
            </div>
        </div>

        <!-- Tela de Edição (gerenciar semana) -->
        <div id="telaEdicao" class="tela">
            <h2 class="titulo-edicao">✎ editar tarefas da semana</h2>
            
            <div class="dias-semana">
                <button class="dia-btn" data-dia="Seg">Seg</button>
                <button class="dia-btn" data-dia="Ter">Ter</button>
                <button class="dia-btn" data-dia="Qua">Qua</button>
                <button class="dia-btn" data-dia="Qui">Qui</button>
                <button class="dia-btn" data-dia="Sex">Sex</button>
                <button class="dia-btn" data-dia="Sáb">Sáb</button>
                <button class="dia-btn" data-dia="Dom">Dom</button>
            </div>

            <div class="dia-selecionado" id="diaSelecionadoLabel">
                Selecione um dia
            </div>

            <div class="tarefas-lista" id="tarefasEdicao">
                <!-- Tarefas do dia selecionado -->
            </div>

            <div class="adicionar-tarefa">
                <input type="text" id="novaTarefa" placeholder="Nova tarefa..." class="input-tarefa">
                <button class="btn-adicionar" id="btnAdicionar">Adicionar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
